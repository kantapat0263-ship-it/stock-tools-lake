<link rel="manifest" href="/manifest.webmanifest">

<link rel="apple-touch-icon" href="/icon-192.png">

<style>
:root{
  --navy:#0f2744; --navy2:#16365c; --navydark:#0a1c33; --blue:#2563eb; --blue-d:#1d4ed8;
  --bg:#f1f5f9; --card:#fff; --line:#e2e8f0; --ink:#0f172a; --muted:#64748b;
  --green:#16a34a; --amber:#d97706; --red:#dc2626; --gray:#64748b;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Noto Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
.app{display:flex;min-height:100vh}
/* ---------- sidebar ---------- */
.side{width:230px;background:linear-gradient(180deg,var(--navy),var(--navydark));color:#cbd5e1;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:20px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .logo{width:38px;height:38px;border-radius:9px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:17px}
.brand b{color:#fff;font-size:17px;display:block;line-height:1.1}
.brand small{color:#7891b5;font-size:10px;letter-spacing:.5px}
.nav{padding:12px 10px;flex:1;overflow:auto}
.nav button{width:100%;text-align:left;background:none;border:0;color:#cbd5e1;padding:11px 14px;border-radius:9px;cursor:pointer;font:inherit;display:flex;align-items:center;gap:11px;margin-bottom:3px}
.nav button:hover{background:rgba(255,255,255,.06);color:#fff}
.nav button.active{background:var(--blue);color:#fff;font-weight:600;box-shadow:0 4px 12px rgba(37,99,235,.35)}
.nav .ic{width:20px;text-align:center}
.sidefoot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#7891b5}
/* ---------- main ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:5}
.topbar h2{margin:0;font-size:19px}
.topbar .sub{color:var(--muted);font-size:12px}
.spacer{flex:1}
.coswitch{display:flex;background:var(--bg);border-radius:9px;padding:3px;gap:2px;border:1px solid var(--line)}
.coswitch button{border:0;background:none;padding:7px 16px;border-radius:7px;cursor:pointer;font:inherit;color:var(--muted);font-weight:600}
.coswitch button.on{background:var(--blue);color:#fff}
.user{display:flex;align-items:center;gap:9px}
.user .av{width:38px;height:38px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
.view{padding:24px 26px}
.menubtn{display:none;background:none;border:0;font-size:24px;line-height:1;cursor:pointer;color:var(--ink);padding:2px 8px 2px 0}
.navback{display:none}
@media (max-width:768px){
  .side{position:fixed;left:0;top:0;width:230px;height:100vh;z-index:60;transform:translateX(-100%);transition:transform .25s ease}
  .app.navopen .side{transform:translateX(0);box-shadow:0 0 50px rgba(0,0,0,.5)}
  .app.navopen .navback{display:block;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:55}
  .menubtn{display:block}
  .topbar{padding:11px 12px;gap:8px}
  .topbar h2{font-size:16px}
  .topbar .sub{display:none}
  .user .uinfo{display:none}
  .user .av{width:32px;height:32px;font-size:13px}
  .coswitch button{padding:6px 9px;font-size:12.5px}
  .view{padding:14px 11px}
  .cards{grid-template-columns:repeat(2,1fr);gap:10px}
  .card{padding:13px 14px}
  .card .big{font-size:23px}
  .grid3{grid-template-columns:1fr !important}
  .life{overflow-x:auto}
  .flexrow{flex-direction:column;gap:8px}
  table{font-size:12.5px}
}
/* ---------- cards ---------- */
.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.card .lab{color:var(--muted);font-size:12px;display:flex;align-items:center;gap:7px;margin-bottom:6px}
.card .big{font-size:30px;font-weight:800;line-height:1}
.card .pct{font-size:12px;color:var(--muted);margin-top:6px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:16px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
.panel h3{margin:0 0 14px;font-size:15px;display:flex;align-items:center;justify-content:space-between}
.panel h3 a{font-size:12px;color:var(--blue);text-decoration:none;cursor:pointer}
/* lifecycle strip */
.life{display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:var(--navy);border-radius:14px;padding:18px 20px;color:#fff;margin-bottom:18px}
.life .st{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:64px}
.life .st .b{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(255,255,255,.1)}
.life .st small{font-size:11px;color:#cbd5e1}
.life .ar{color:#5b7aa6;font-size:18px}
/* tables */
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);font-size:13px}
th{color:var(--muted);font-weight:600;font-size:12px;background:#f8fafc}
.locktbl thead th{position:sticky;top:0;z-index:1}
.listbox{max-height:62vh;overflow:auto}
tbody tr:hover{background:#f8fafc}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.chip .dot{width:8px;height:8px}
/* controls */
.toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
input,select,textarea{font:inherit;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
input:focus,select:focus{outline:2px solid var(--blue);outline-offset:-1px}
.search{flex:1;min-width:200px}
.btn{border:0;border-radius:9px;padding:10px 16px;font:inherit;font-weight:600;cursor:pointer;background:#eef2f7;color:var(--ink);display:inline-flex;align-items:center;gap:7px}
.btn:hover{filter:brightness(.97)}
.btn.primary{background:var(--blue);color:#fff}
.btn.green{background:var(--green);color:#fff}
.btn.ghost{background:none;border:1px solid var(--line)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.muted{color:var(--muted)}
.right{text-align:right}
.center{text-align:center}
/* modal / drawer */
.scrim{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:40}
.scrim.on{display:flex}
.modal{background:#fff;border-radius:16px;max-width:560px;width:92%;max-height:88vh;overflow:auto;padding:22px}
.modal h3{margin:0 0 4px}
.field{margin:12px 0}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%}
.flexrow{display:flex;gap:10px}
.flexrow>*{flex:1}
.selbar{position:sticky;bottom:0;background:#fff;border-top:2px solid var(--blue);padding:14px 18px;display:flex;align-items:center;gap:14px;border-radius:0 0 14px 14px;margin:0 -18px -18px}
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tabs button{border:1px solid var(--line);background:#fff;padding:9px 18px;border-radius:9px;cursor:pointer;font:inherit;font-weight:600;color:var(--muted)}
.tabs button.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:13px 22px;border-radius:11px;z-index:60;opacity:0;transition:.25s;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.toast.on{opacity:1}
.tl{list-style:none;padding:0;margin:0}
.tl li{display:flex;gap:14px;padding:10px 0;border-bottom:1px dashed var(--line)}
.tl .ti{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#eef2f7}
.empty{text-align:center;color:var(--muted);padding:40px}
/* ---------- print ---------- */
#printArea{display:none}
@media print{
  body{background:#fff}
  .app,.scrim{display:none !important}
  #printArea{display:block !important;font-family:Tahoma,'Noto Sans Thai',sans-serif;color:#000;padding:0}
  @page{size:A4 portrait;margin:12mm}
  @page land{size:A4 landscape;margin:8mm}
}
.doc.land{page:land}
.rsdoc{font-size:11px}
.rshd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.rshd-l{flex:1;font-size:12px;font-weight:bold;line-height:1.3}
.rslogo{display:block;height:14mm;width:auto;max-width:38mm;object-fit:contain;margin-bottom:2px}
.rshd-c{flex:2;text-align:center}
.rsttl{font-size:18px;font-weight:bold}
.rssub{font-size:12px;margin-top:2px}
.rshd-r{flex:1.3;text-align:right;font-size:11px}
.rsorig{font-weight:bold;font-style:italic;font-size:14px}
.rsrecv{margin-top:12px;line-height:2.1}
.rsmeta{display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px 16px;font-size:12px;margin-bottom:6px;border:1px solid #000;padding:5px 8px}
.rsdoc table{table-layout:fixed}
.rsdoc th,.rsdoc td.c{text-align:center}
.rsdoc td{height:23px;vertical-align:middle}
.rspage{page:land;break-after:page}
.rspage:last-of-type{break-after:auto}
/* ใบส่งเครื่องมือ 2 สำเนา/แผ่น */
.bpair{display:flex;width:100%;align-items:stretch}
.bcopy{flex:1;padding:0 5mm;font-size:10px;color:#000;min-width:0}
.bcut{border-left:1.5px dashed #888;margin:0 1mm}
.bhd{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1.5px solid #000;padding-bottom:4px;margin-bottom:4px}
.blogo{width:20mm;height:14mm;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;color:#777;flex-shrink:0}
.blogo img{max-width:100%;max-height:100%;object-fit:contain}
.bttl{text-align:center;flex:1;padding:0 2mm}
.bt1{font-size:16px;font-weight:bold}
.bt2{font-size:10px}
.bno{text-align:center;font-size:10px;flex-shrink:0;white-space:nowrap}
.bno b{font-size:14px}
.binfo{font-size:11px;margin-bottom:5px}
.binfo .r{display:flex;justify-content:space-between;gap:6px}
.btbl{width:100%;border-collapse:collapse;table-layout:fixed;font-size:10px;margin-bottom:2px}
.btbl th,.btbl td{border:1px solid #000;padding:3px;word-wrap:break-word}
.btbl th{background:#f0f0f0;text-align:center;font-weight:bold}
.btbl td{height:22px;vertical-align:middle}
.btbl td.c{text-align:center}
.bsign{display:flex;margin-top:18px;text-align:center;font-size:10px;gap:8px}
.bsign>div{flex:1}
.bsline{display:inline-block;width:92%;border-bottom:1px dotted #000;margin-bottom:2px}
.brecv{margin-top:14px;font-size:10px;text-align:left;line-height:2}
.doc{width:100%;color:#000;font-family:Tahoma,'Noto Sans Thai',sans-serif}
.doc h1{text-align:center;font-size:18px;margin:0 0 2px}
.doc .dsub{text-align:center;font-size:12px;margin-bottom:10px}
.doc .dhead{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px}
.doc table{width:100%;border-collapse:collapse;font-size:12px}
.doc th,.doc td{border:1px solid #000;padding:4px 6px}
.doc th{text-align:center;background:#fff}
.doc .sign{display:flex;justify-content:space-around;margin-top:34px;font-size:13px;text-align:center}
.doc .sign div{flex:1}
</style>
</head>

const sb = window.supabase.createClient(SB_URL, SB_KEY);
let S = {tools:[],slips:[],movements:[],lookups:{categories:[],projects:[],people:[],vendors:[]},nextSlip:1};
let CUR='dash', ME=null;
function today(){const d=new Date();return d.toISOString().slice(0,10);}
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ============ status helpers ============ */
const STC={'ว่าง':'#16a34a','ถูกยืม':'#2563eb','ส่งซ่อม':'#64748b','รอส่งซ่อม':'#d97706','ชำรุด':'#dc2626'};
function chip(st){const c=STC[st]||'#94a3b8';const bg={'#16a34a':'#dcfce7','#2563eb':'#dbeafe','#64748b':'#f1f5f9','#d97706':'#fef3c7','#dc2626':'#fee2e2'}[c]||'#f1f5f9';
  return `<span class="chip" style="background:${bg};color:${c}"><span class="dot" style="background:${c}"></span>${esc(st||'-')}</span>`;}
function count(st){return S.tools.filter(t=>t.status===st&&inView(t)).length;}

let tmo;function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('on');clearTimeout(tmo);tmo=setTimeout(()=>t.classList.remove('on'),2200);}
/* ---- data layer (Supabase) ---- */
function rowToTool(r){return {id:r.id,company:r.company,cat:r.category||'',no:r.no||'',code:((r.category||'')+' '+(r.no||'')).trim(),name:r.name||'',brand:r.brand||'',sn:r.serial||'',status:r.status||'ว่าง',loc:r.location||'',note:r.note||'',updated:(r.updated_at||'').slice(0,10),repairs:'0',purchaseDate:(r.purchase_date||''),price:(r.price!=null?String(r.price):''),warranty:r.warranty||'',receiptPending:!!r.receipt_pending,pendingDest:r.pending_dest||'',dispatchedAt:(r.dispatched_at||''),createdAt:(r.created_at||''),tagged:!!r.tagged,taggedAt:(r.tagged_at||''),model:r.model||'',imageUrl:r.image_url||''};}
function modelKey(t){return (t&&t.brand&&t.model)?((t.brand+' '+t.model).toUpperCase().replace(/[^A-Z0-9]+/g,'')):'';}
function toolImgHtml(t){const url=t.imageUrl||(modelKey(t)?('/m/'+modelKey(t)+'.png'):'');if(!url)return '';
  return `<div style="text-align:center;margin:2px 0 12px"><img src="${esc(url)}" alt="" style="max-width:100%;max-height:150px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;padding:4px" onerror="this.parentNode.style.display='none'"></div>`;}
function rowToSlip(s){return {id:s.id,slip_no:s.slip_no,no:String(s.slip_no).padStart(3,'0'),sent:(s.sent_date||''),vendor:s.vendor||'',project:s.project||'',sender:s.sender||'',status:s.status||'ส่งแล้ว',received:(s.received_date||''),receiver:s.receiver||'',note:s.note||'',count:'0',company:s.company};}
function rowToMov(m,byId){const t=m.tool_id?byId[m.tool_id]:null;return {id:m.id,tool_id:m.tool_id,slipNo:m.slip_no,date:(m.occurred_on||''),code:t?t.code:(m.label||''),cat:t?t.cat:'',no:t?t.no:'',type:m.type,slip:m.slip_no?String(m.slip_no).padStart(3,'0'):'',project:m.project||'',actor:m.actor||'',vendor:m.counterparty||'',reason:m.reason||'',doc:m.doc_no||'',note:m.note||'',label:m.label||'',company:m.company,createdAt:m.created_at||'',recordedBy:m.recorded_by||'',ownerCompany:m.owner_company||'',borrowNo:(m.borrow_no!=null?m.borrow_no:null)};}
async function fetchAllMov(){
  const all=[];const PAGE=1000;let from=0;
  for(;;){
    const {data,error}=await sb.from('movements').select('*').eq('deleted',false).order('occurred_on').order('id').range(from,from+PAGE-1);
    if(error){toast('โหลดประวัติไม่ครบ: '+error.message);break;}
    all.push(...(data||[]));
    if(!data||data.length<PAGE)break;
    from+=PAGE;
  }
  return all;
}
async function loadAll(){
  const mvP=fetchAllMov();
  const [t,s,c,p,pe,v,au,tr,st]=await Promise.all([
    sb.from('tools').select('*').eq('deleted',false),
    sb.from('repair_slips').select('*').eq('deleted',false).order('slip_no'),
    sb.from('categories').select('name'),sb.from('projects').select('name'),
    sb.from('people').select('name'),sb.from('vendors').select('name'),
    sb.from('audit_log').select('*').order('occurred_at',{ascending:false}).limit(1000),
    sb.from('tools').select('*').eq('deleted',true),
    sb.from('repair_slips').select('*').eq('deleted',true).order('slip_no')]);
  const mv={data:await mvP};
  if(t.error){toast('โหลดข้อมูลไม่ได้: '+t.error.message);}
  const byId={};
  S.tools=(t.data||[]).map(rowToTool); S.tools.forEach((x,i)=>{x.i=i;byId[x.id]=x;});
  S.slips=(s.data||[]).map(rowToSlip);
  S.movements=(mv.data||[]).map(m=>rowToMov(m,byId));
  const rc={},slc={};
  S.movements.forEach(m=>{if(m.type==='ส่งซ่อม'){if(m.tool_id)rc[m.tool_id]=(rc[m.tool_id]||0)+1;if(m.slip)slc[m.slip]=(slc[m.slip]||0)+1;}});
  S.tools.forEach(x=>x.repairs=String(rc[x.id]||0));
  S.slips.forEach(x=>x.count=String(slc[x.no]||0));
  const nm=d=>[...new Set((d.data||[]).map(r=>r.name).filter(Boolean))].sort();
  S.lookups={categories:nm(c),projects:nm(p),people:nm(pe),vendors:nm(v)};
  S.audit=(au.data||[]);
  S.trash=(tr.data||[]).map(rowToTool);
  S.slipTrash=(st.data||[]).map(rowToSlip);
  S.nextSlipByCo={};['PAC','LOTUS'].forEach(co=>S.nextSlipByCo[co]=(S.slips.filter(x=>x.company===co).reduce((m,x)=>Math.max(m,x.slip_no||0),0))+1);
  const {data:cntRows}=await sb.from('app_counters').select('company,value').eq('name','borrow');
  S.nextBorrowByCo={};['PAC','LOTUS'].forEach(co=>{const r=(cntRows||[]).find(x=>x.company===co);let v=((r&&r.value)||0)+1;if(v>999)v=1;S.nextBorrowByCo[co]=v;});
}
async function ensureLookup(tbl,name,co){name=(name||'').trim();if(!name)return;if((S.lookups[tbl]||[]).includes(name))return;try{await sb.from(tbl).insert({company:co||COMPANY,name});}catch(e){}}
async function reload(view){await loadAll();go(view||CUR);}
/* ---- auth ---- */
async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){showLogin();return;}
  const u=session.user;
  const {data:pr}=await sb.from('profiles').select('*').eq('id',u.id).maybeSingle();
  ME={id:u.id,email:u.email,role:pr?pr.role:'staff',company:pr?pr.company:null};
  $('#loginScrim').style.display='none';
  document.querySelector('.app').style.display='flex';
  $('#uemail').textContent=ME.email; $('#urole').textContent=(ME.role==='admin'?'ผู้ดูแลระบบ':'พนักงาน '+(ME.company||''));
  if(ME.role==='admin'){$('#navUsers').style.display='';$('#navAudit').style.display='';}
  if(ME.role!=='admin'&&ME.company){COMPANY=ME.company;FILTER=ME.company;document.querySelectorAll('#coswitch button').forEach(b=>b.classList.toggle('on',(b.dataset.co||'')===FILTER));}
  applyTheme(ME.company);
  await loadAll();
  if(!S.tools.length && ME.role!=='admin'){toast('บัญชีนี้ยังไม่ถูกตั้งสิทธิ์ — แจ้งแอดมินตั้งบริษัท/admin ให้');}
  const _q=new URLSearchParams(location.search);
  const _tp=_q.get('t');
  if(_tp){ go('scan'); const _tt=S.tools.find(x=>x.id===_tp); if(_tt)showScanTool(_tt); }
  else if(_q.get('scan')){ go('scan'); }
  else go('dash');
}
function showLogin(){$('#loginScrim').style.display='flex';document.querySelector('.app').style.display='none';}
async function doLogin(){const e=$('#li_email').value.trim(),p=$('#li_pass').value;$('#li_msg').textContent='กำลังเข้าสู่ระบบ…';
  const {error}=await sb.auth.signInWithPassword({email:e,password:p});
  if(error){$('#li_msg').textContent='เข้าสู่ระบบไม่ได้: '+error.message;return;} init();}
async function doSignup(){const e=$('#li_email').value.trim(),p=$('#li_pass').value;
  if(!e||p.length<6){$('#li_msg').textContent='ใส่อีเมล + รหัสผ่าน (อย่างน้อย 6 ตัว)';return;}
  $('#li_msg').textContent='กำลังสมัคร…';
  const {data,error}=await sb.auth.signUp({email:e,password:p});
  if(error){$('#li_msg').textContent='สมัครไม่ได้: '+error.message;return;}
  if(data.session){$('#li_msg').textContent='สมัครสำเร็จ! กำลังเข้าสู่ระบบ…';setTimeout(init,600);}
  else{$('#li_msg').style.color='#16a34a';$('#li_msg').textContent='สมัครแล้ว — โปรดยืนยันอีเมลก่อน หรือกด เข้าสู่ระบบ';}}

function mkDonut(segs,total){
  let acc=0;const R=70,C=2*Math.PI*R;const colors=segs.map(s=>STC[s[0]]||'#94a3b8');
  const circles=segs.map((s,i)=>{const frac=total?s[1]/total:0;const dash=frac*C;const el=`<circle r="${R}" cx="90" cy="90" fill="none" stroke="${colors[i]}" stroke-width="26" stroke-dasharray="${dash} ${C-dash}" stroke-dashoffset="${-acc*C}" transform="rotate(-90 90 90)"/>`;acc+=frac;return el;}).join('');
  const leg=segs.map((s,i)=>`<div style="display:flex;align-items:center;gap:8px;margin:5px 0;font-size:13px"><span class="dot" style="background:${colors[i]}"></span>${esc(s[0])} <b style="margin-left:auto">${s[1]}</b></div>`).join('');
  return `<div style="display:flex;align-items:center;gap:18px"><svg width="180" height="180" viewBox="0 0 180 180">${circles}<text x="90" y="86" text-anchor="middle" font-size="26" font-weight="800">${total}</text><text x="90" y="106" text-anchor="middle" font-size="12" fill="#64748b">รายการ</text></svg><div style="flex:1">${leg}</div></div>`;
}

    }</tbody></table></div>${pg.html}`;
  };

  const td=()=>{pgReset('tools');draw();};
  $('#tq').oninput=td;$('#fcat').onchange=td;$('#fst').onchange=td;$('#fsite').onchange=td;$('#fsort').onchange=td;draw();

/* ============ ของตามไซต์ ============ */
function siteOf(t){if(t.status!=='ถูกยืม')return '';const s=(t.pendingDest||(t.loc||'').split('/')[0]||'').trim();return (s&&s!=='ออฟฟิต')?s:'';}
function holderOf(t){return (t.loc||'').split('/').slice(1).join('/').trim();}
function daysOut(t){const b=t.dispatchedAt||t.updated;if(!b)return null;const d=Math.floor((Date.now()-new Date(b).getTime())/86400000);return (isNaN(d)||d<0)?null:d;}
let siteSel=null,_siteMap={},_siteKeys=[],_bySiteDraw=null;
function renderBySite(){
  $('#view').innerHTML=`<div class="panel">
    <h3>📍 ของตามไซต์ <span class="muted" style="font-weight:400">— เลือกไซต์เพื่อดูเครื่องที่อยู่ที่นั่นตอนนี้</span></h3>
    <div id="siteChips" style="display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 2px"></div>
    <div id="siteBody"></div>
  </div>`;
  _bySiteDraw=()=>{
    _siteMap={};
    S.tools.filter(t=>inView(t)).forEach(t=>{const s=siteOf(t);if(!s)return;(_siteMap[s]=_siteMap[s]||[]).push(t);});
    _siteKeys=Object.keys(_siteMap).sort((a,b)=>_siteMap[b].length-_siteMap[a].length);
    if(!_siteKeys.length){$('#siteChips').innerHTML='';$('#siteBody').innerHTML='<div class="empty" style="padding:24px">ยังไม่มีเครื่องถูกยืมออกไซต์ตอนนี้</div>';return;}
    if(siteSel==null||!_siteMap[siteSel])siteSel=_siteKeys[0];
    $('#siteChips').innerHTML=_siteKeys.map((s,i)=>`<button class="btn ${s===siteSel?'primary':''}" style="padding:6px 13px" onclick="pickSite(${i})">${esc(s)} · ${_siteMap[s].length}</button>`).join('');
    drawSiteBody();
  };
  _bySiteDraw();
}
function pickSite(i){siteSel=_siteKeys[i];if(_bySiteDraw)_bySiteDraw();}

  const tools=_siteMap[siteSel]||[];
  $('#siteBody').innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin:14px 0 8px"><b style="font-size:15px">${esc(siteSel)} <span class="muted" style="font-weight:400">· ${tools.length} เครื่อง</span></b></div>

    }</tbody></table>`;};
  $('#siteq').oninput=draw;draw();

async function addSiteInline(){
  const name=(prompt('ชื่อไซต์ใหม่:')||'').trim(); if(!name)return;
  const sel=$('#b_proj');
  if(S.lookups.projects.some(p=>p.toLowerCase()===name.toLowerCase())){if(sel)sel.value=name;toast('มีไซต์นี้อยู่แล้ว');return;}

async function addSite(){
  const name=($('#newsite').value||'').trim(); if(!name){toast('ใส่ชื่อไซต์ก่อน');return;}

async function renameSite(i){

async function uploadToolImg(i){
  const t=S.tools[i]; const inp=$('#ed_imgfile'); const f=inp&&inp.files&&inp.files[0];
  if(!f){return;}
  if(!/^image\//.test(f.type)){toast('ต้องเป็นไฟล์รูป');return;}
  if(f.size>5*1024*1024){toast('ไฟล์ใหญ่เกิน 5MB');return;}
  toast('กำลังอัปโหลดรูป…');
  const ext=((f.name.split('.').pop()||'png').toLowerCase().replace(/[^a-z0-9]/g,''))||'png';
  const base=modelKey(t)||('t'+t.id);
  const path=base+'_'+Date.now()+'.'+ext;
  const up=await sb.storage.from('tool-img').upload(path,f,{upsert:true,contentType:f.type});
  if(up.error){toast('อัปโหลดไม่ได้: '+up.error.message);return;}
  const url=sb.storage.from('tool-img').getPublicUrl(path).data.publicUrl;
  const k=modelKey(t);
  const ids=k?S.tools.filter(x=>modelKey(x)===k).map(x=>x.id):[t.id];
  const {error}=await sb.from('tools').update({image_url:url,updated_at:new Date().toISOString()}).in('id',ids);
  if(error){toast('บันทึกไม่ได้: '+error.message);return;}
  S.tools.forEach(x=>{if(ids.includes(x.id))x.imageUrl=url;});
  toast('✅ ใส่รูปแล้ว ('+ids.length+' เครื่องรุ่นนี้)');
  toolDetail(i);
}

async function saveTool(i){const t=S.tools[i];
  if(!canEditCo(t.company)){toast('แก้ได้เฉพาะบริษัทตัวเอง');return;}
  const cat=$('#ed_cat').value.trim(),no=$('#ed_no').value.trim(),company=$('#ed_company').value;
  if(!cat||!no){toast('ต้องมี หมวด + NO');return;}
  const code=(cat+' '+no).trim();
  const keyChanged=(t.company!==company)||((t.no||'').trim().toUpperCase()!==no.toUpperCase());
  const dupT=keyChanged?S.tools.find((x,ix)=>ix!==i&&x.company===company&&(x.no||'').trim().toUpperCase()===no.toUpperCase()):null;
  if(dupT){toast('❌ NO นี้มีอยู่แล้วใน '+company+': '+no+' — '+(dupT.cat||dupT.code));return;}
  const nv={company,cat,no,name:$('#ed_name').value.trim(),brand:$('#ed_brand').value.trim(),model:$('#ed_model').value.trim(),sn:$('#ed_sn').value.trim(),status:$('#ed_st').value,loc:$('#ed_loc').value.trim(),note:$('#ed_note').value.trim(),purchaseDate:$('#ed_pdate').value,price:$('#ed_price').value,warranty:$('#ed_warranty').value.trim()};
  const L={company:'บริษัท',cat:'หมวด',no:'NO',name:'ชื่อ',brand:'ยี่ห้อ',model:'รุ่น',sn:'S/N',status:'สถานะ',loc:'อยู่ที่',note:'หมายเหตุ',purchaseDate:'วันที่ซื้อ',price:'ราคา',warranty:'ประกัน'};
  const ch=Object.keys(L).filter(k=>String(t[k]||'')!==String(nv[k]||'')).map(k=>`${L[k]}: ${t[k]||'-'}→${nv[k]||'-'}`);
  const {error}=await sb.from('tools').update({company:company,category:cat,no:no,name:nv.name,brand:nv.brand,model:nv.model,serial:nv.sn,status:nv.status,location:nv.loc,note:nv.note,purchase_date:nv.purchaseDate||null,price:(nv.price!==''?Number(nv.price):null),warranty:nv.warranty,updated_at:new Date().toISOString()}).eq('id',t.id);
  if(error){toast('บันทึกไม่ได้: '+error.message);return;}
  await ensureLookup('categories',cat,company);
  await logAudit('แก้ไข',company,code,ch.length?ch.join(' · '):'แก้ไข (ไม่มีอะไรเปลี่ยน)');
  closeModal();toast('บันทึกแล้ว');await loadAll();go('tools');}

      </colgroup>`;
  const thead=`<thead>
        <tr>
          <th rowspan="2">ลำดับ</th>

          <th colspan="2">รหัสเครื่องมือ</th>

          <th rowspan="2">อาการ/สาเหตุที่ส่งซ่อม</th>

        <td>${it?esc(it.reason||''):''}</td>

        <div class="rshd-r"><div class="rsorig">ORIGINAL</div>
          <div class="rsrecv">เซ็นชื่อผู้รับเครื่องมือซ่อม ...........................<br>วันที่รับเครื่องมือซ่อม ......./......./.........</div>
        </div>
      </div>
      <div class="rsmeta">
        <span>วันที่ส่งซ่อม: <b>${esc(fmtDateTH(date))}</b></span>
        <span>ร้าน/ช่างซ่อม: <b>${esc(vendor)||'.............................'}</b></span>
        <span>ผู้ส่งซ่อม: <b>${esc(sender)||'.............................'}</b></span>
        <span>จำนวน: <b>${items.length}</b> เครื่อง</span>

  }

}

async function doCancelSlip(no,co){
  const slipN=parseInt(no,10);
  const tids=S.movements.filter(m=>m.slipNo===slipN&&m.company===co&&m.type==='ส่งซ่อม'&&m.tool_id).map(m=>m.tool_id);
  for(const tid of tids){const t=S.tools.find(x=>x.id===tid);if(t&&t.status==='ส่งซ่อม'){await sb.from('tools').update({status:'ว่าง',location:'ออฟฟิต'}).eq('id',tid);}}
  await sb.from('movements').update({deleted:true}).eq('company',co).eq('slip_no',slipN).in('type',['ส่งซ่อม','รับคืนจากซ่อม']);
  await sb.from('repair_slips').update({deleted:true}).eq('company',co).eq('slip_no',slipN);
  closeModal();toast('ยกเลิกใบ #'+no+' → ย้ายเข้าถังขยะแล้ว');await loadAll();go('receive');}
async function restoreSlip(no,co){
  if(!canEditCo(co)){toast('กู้คืนได้เฉพาะบริษัทที่มีสิทธิ์');return;}
  const slipN=parseInt(no,10);
  const {data:mvs}=await sb.from('movements').select('tool_id,type').eq('company',co).eq('slip_no',slipN);
  await sb.from('repair_slips').update({deleted:false}).eq('company',co).eq('slip_no',slipN);
  await sb.from('movements').update({deleted:false}).eq('company',co).eq('slip_no',slipN).in('type',['ส่งซ่อม','รับคืนจากซ่อม']);
  const sentIds=new Set((mvs||[]).filter(m=>m.type==='ส่งซ่อม'&&m.tool_id).map(m=>m.tool_id));
  const recvIds=new Set((mvs||[]).filter(m=>m.type==='รับคืนจากซ่อม'&&m.tool_id).map(m=>m.tool_id));
  for(const tid of sentIds){if(recvIds.has(tid))continue;const t=S.tools.find(x=>x.id===tid);if(t&&t.status==='ว่าง')await sb.from('tools').update({status:'ส่งซ่อม'}).eq('id',tid);}
  toast('กู้คืนใบ #'+no+' จากถังขยะแล้ว');await loadAll();go('trash');}

const PG={},PG_REDRAW={};
function pgState(k){return PG[k]||(PG[k]={page:1,size:50});}
function pgReset(k){pgState(k).page=1;}
function pgSlice(k,items){const st=pgState(k),total=items.length,pages=Math.max(1,Math.ceil(total/st.size));
  if(st.page>pages)st.page=pages; if(st.page<1)st.page=1;
  const from=(st.page-1)*st.size, rows=st.size>=1e9?items:items.slice(from,from+st.size);
  return {rows,html:pgBar(k,total,from,rows.length,pages)};}
function pgBar(k,total,from,shown,pages){if(!total)return '';const st=pgState(k);
  const opts=[25,50,100].map(n=>`<option value="${n}" ${st.size===n?'selected':''}>${n}/หน้า</option>`).join('')+`<option value="1000000000" ${st.size>=1e9?'selected':''}>ทั้งหมด</option>`;
  return `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin:12px 2px 2px;font-size:13px">
    <span class="muted">แสดง ${from+1}–${from+shown} จาก ${total}</span>
    <select onchange="pgSize('${k}',this.value)" style="padding:4px 6px;width:auto">${opts}</select>
    <button class="btn" style="padding:3px 11px" ${st.page<=1?'disabled':''} onclick="pgGo('${k}',${st.page-1})">‹</button>
    <span style="white-space:nowrap">หน้า <input type="number" min="1" max="${pages}" value="${st.page}" style="width:50px;text-align:center;padding:3px" onchange="pgGo('${k}',this.value)"> / ${pages}</span>
    <button class="btn" style="padding:3px 11px" ${st.page>=pages?'disabled':''} onclick="pgGo('${k}',${st.page+1})">›</button>
  </div>`;}
function pgSize(k,v){const st=pgState(k);st.size=parseInt(v,10)||50;st.page=1;pgRedraw(k);}
function pgGo(k,p){pgState(k).page=Math.max(1,parseInt(p,10)||1);pgRedraw(k);}
function pgRedraw(k){PG_REDRAW[k]&&PG_REDRAW[k]();}
function dayLabel(dstr){if(!dstr)return 'ไม่ระบุวันที่';const y=new Date(Date.now()-86400000).toISOString().slice(0,10);if(dstr===today())return 'วันนี้ ('+dstr+')';if(dstr===y)return 'เมื่อวาน ('+dstr+')';return dstr;}

async function saveSlip(){
  const e=window._es; if(!e)return;
  const sent=$('#es_date').value, vendor=$('#es_vendor').value.trim(), sender=$('#es_sender').value.trim(), note=$('#es_note').value.trim();
  await sb.from('repair_slips').update({sent_date:sent||null,vendor,sender,note}).eq('company',e.co).eq('slip_no',e.slipNo);
  for(let i=0;i<e.movs.length;i++){const m=e.movs[i];
    const rm=document.querySelector(`[data-rm="${i}"]`);
    if(rm&&rm.checked){
      if(m.id)await sb.from('movements').update({deleted:true}).eq('id',m.id);
      if(m.tool_id){const t=S.tools.find(x=>x.id===m.tool_id);if(t&&t.status==='ส่งซ่อม')await sb.from('tools').update({status:'ว่าง',location:'ออฟฟิต',updated_at:new Date().toISOString()}).eq('id',m.tool_id);}
      continue;}
    const r=document.querySelector(`[data-er="${i}"]`);
    if(m.id&&r&&r.value!==(m.reason||''))await sb.from('movements').update({reason:r.value}).eq('id',m.id);}
  const adds=[...document.querySelectorAll('[data-radd]:checked')].map(c=>c.getAttribute('data-radd'));
  for(const tid of adds){const t=S.tools.find(x=>x.id===tid); if(!t)continue;
    const rs=document.querySelector(`[data-rar="${tid}"]`); const reason=rs?rs.value.trim():'';
    await sb.from('tools').update({status:'ส่งซ่อม',location:vendor||'ร้านซ่อม',updated_at:new Date().toISOString()}).eq('id',tid);
    await sb.from('movements').insert({company:e.co,owner_company:t.company,recorded_by:(ME&&ME.email)||'',tool_id:tid,occurred_on:sent||null,type:'ส่งซ่อม',slip_no:e.slipNo,actor:sender,counterparty:vendor,reason});
  }
  await ensureLookup('vendors',vendor);await ensureLookup('people',sender);
  closeModal();toast(adds.length?`แก้ไขใบส่งซ่อม #${String(e.slipNo).padStart(3,'0')} + เพิ่ม ${adds.length} เครื่องแล้ว`:'แก้ไขใบส่งซ่อม #'+String(e.slipNo).padStart(3,'0')+' แล้ว');await loadAll();go('history');
}

function csvDownload(filename,rows){
  const q=v=>{v=v==null?'':String(v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const csv='﻿'+rows.map(r=>r.map(q).join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}

let scanTool=null;
function stopScanner(){ if(window._scanner){try{window._scanner.stop().then(()=>{try{window._scanner.clear();}catch(e){}}).catch(()=>{});}catch(e){} window._scanner=null;} }
async function startScanner(){
  if(!window.Html5Qrcode){toast('ไลบรารีสแกนยังโหลดไม่เสร็จ ลองรีเฟรช');return;}
  stopScanner();
  try{
    const h=new Html5Qrcode('qrreader'); window._scanner=h;
    await h.start({facingMode:'environment'},{fps:10,qrbox:{width:220,height:220}},txt=>{resolveScan(txt);},()=>{});
    $('#scanStart').style.display='none'; $('#scanStop').style.display='';
  }catch(e){ window._scanner=null; toast('เปิดกล้องไม่ได้: '+(e.message||e)+' — พิมพ์รหัส/NO แทนได้'); }

function resolveScan(text){
  if(!text)return; const q=String(text).trim(); let id=null;
  const m=q.match(/[?&]t=([0-9a-fA-F-]{6,})/); if(m)id=m[1];
  let t=id?S.tools.find(x=>x.id===id):null;
  if(!t){ const lq=q.toLowerCase();
    const cands=S.tools.filter(x=>(x.code+' '+x.name+' '+x.no).toLowerCase().includes(lq)||(x.no||'').toLowerCase()===lq);
    if(cands.length===1)t=cands[0]; else if(cands.length>1){stopScanner();showScanCandidates(cands);return;} }
  if(!t){ $('#scanResult').innerHTML='<div class="panel empty">ไม่พบเครื่อง — ลองพิมพ์รหัส/NO ใหม่</div>'; return; }
  stopScanner(); $('#scanStart').style.display=''; $('#scanStop').style.display='none';
  showScanTool(t);
}
function showScanCandidates(cands){
  $('#scanResult').innerHTML=`<div class="panel"><h3>พบหลายตัว — เลือก</h3>${cands.slice(0,8).map(t=>`<div onclick="showScanToolById('${t.id}')" style="cursor:pointer;padding:9px;border:0.5px solid var(--line);border-radius:8px;margin-bottom:6px"><b>${esc(t.code)}</b> ${coBadge(t.company)} · ${esc(t.name).slice(0,32)}</div>`).join('')}</div>`;
}

/* ============ QR LABELS (ป้าย QR — เฟส 1) ============ */
const QR_BASE='https://stock-tools-lake.vercel.app/s.html?t=';
let selLabel=new Set(), lblFiltered=[], lblOnlyUntagged=false;
async function toggleTag(id,on){
  const t=S.tools.find(x=>x.id===id); if(!t)return;
  t.tagged=on; t.taggedAt=on?new Date().toISOString():'';
  await sb.from('tools').update({tagged:on,tagged_at:on?new Date().toISOString():null,updated_at:new Date().toISOString()}).eq('id',id);
  toast(on?'✅ ติด TAG/QR แล้ว: '+(t.no||t.code):'ยกเลิกสถานะ TAG: '+(t.no||t.code));
  if(PG_REDRAW['labels'])PG_REDRAW['labels']();
}
/* วาด QR ลง canvas ตรงๆ จาก module matrix (คมชัด ไม่ต้องโหลดรูป) */
function drawQR(ctx,text,x,y,size){
  if(!window.qrcode)throw new Error('ไลบรารี QR ยังโหลดไม่เสร็จ ลองรีเฟรช');
  const qr=qrcode(0,'H');qr.addData(text);qr.make();
  const n=qr.getModuleCount(),quiet=2,cell=size/(n+quiet*2);
  ctx.fillStyle='#000';
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){if(qr.isDark(r,c))ctx.fillRect(Math.floor(x+(c+quiet)*cell),Math.floor(y+(r+quiet)*cell),Math.ceil(cell),Math.ceil(cell));}
}
/* วาดป้ายเต็ม 5x3 ซม. แนวนอน (QR + NO + ยี่ห้อ/รุ่น + S/N + ปีซื้อ + ตราเจ้าของ + NO ซ้ำ) คืน canvas */
function labelCanvas(t){
  const k=2,W=500*k,H=300*k,c=document.createElement('canvas');c.width=W;c.height=H;
  const x=c.getContext('2d');x.fillStyle='#fff';x.fillRect(0,0,W,H);
  drawQR(x,QR_BASE+t.id,20*k,24*k,208*k);
  x.fillStyle='#000';x.textBaseline='alphabetic';
  const FT='Tahoma,"Noto Sans Thai",Arial,sans-serif',f=(w,s)=>x.font=w+' '+(s*k)+'px '+FT;
  x.textAlign='center';f('600',16);x.fillText('NO. '+(t.no||t.code||''),124*k,256*k,208*k);
  x.textAlign='left';const rx=248*k;
  f('400',16);x.fillText('NO.',rx,44*k);
  f('800',40);x.fillText(t.no||t.code||'',rx,88*k,232*k);
  f('400',18);x.fillText(t.cat||'',rx,118*k,232*k);
  const bm=[t.brand,t.model].filter(Boolean).join(' ')||t.name||'';
  f('600',22);x.fillText(bm,rx,150*k,232*k);
  x.strokeStyle='#000';x.lineWidth=k;x.beginPath();x.moveTo(rx,166*k);x.lineTo(480*k,166*k);x.stroke();
  f('400',18);x.fillText('S/N '+(t.sn||'-'),rx,198*k,150*k);
  const yy=t.purchaseDate?parseInt(String(t.purchaseDate).slice(0,4),10):0;
  if(yy){x.textAlign='right';x.fillText('ซื้อปี '+(yy+543),480*k,198*k);x.textAlign='left';}
  const bw=64*k,bh=30*k,bx=480*k-bw,by=230*k;
  x.textAlign='center';f('400',11);x.fillText('ทรัพย์สิน',bx+bw/2,by-6*k);
  x.fillStyle='#111';x.fillRect(bx,by,bw,bh);
  x.fillStyle='#fff';f('800',17);x.fillText(t.company||'',bx+bw/2,by+20*k);
  return c;
}
function labelDataURL(t){return labelCanvas(t).toDataURL('image/png');}
function downloadLabel(id){const t=(S.tools||[]).find(x=>x.id===id);if(!t){toast('ไม่พบเครื่อง');return;}
  try{const a=document.createElement('a');a.href=labelDataURL(t);a.download='label_'+String(t.no||t.code||id).replace(/[^\w\-ก-๙]+/g,'_')+'.png';document.body.appendChild(a);a.click();a.remove();toast('ดาวน์โหลดป้ายแล้ว');}catch(e){toast('สร้างป้ายไม่ได้: '+e.message);} }

function togLabel(id,on){on?selLabel.add(id):selLabel.delete(id);$('#lcount').textContent='เลือก '+selLabel.size;}
function renderLabels(){
  selLabel=new Set(); lblOnlyUntagged=false;
  $('#view').innerHTML=`<div class="panel">
    <h3>🏷️ ป้าย QR / NFC <span class="muted" style="font-weight:400">— รหัสไม่ซ้ำของแต่ละตัว · ดาวน์โหลดป้ายเต็ม 5×3 ซม. (QR+ข้อมูล) เข้า NIIMBOT, พิมพ์/PDF, หรือคัดลอก URL ไปเขียนลงแท็ก NFC</span></h3>
    <div class="toolbar"><input class="search" id="lq" placeholder="🔎 ค้นหา ชื่อ / หมวด / NO / รหัส">
      <button class="btn" id="lall" style="margin-left:8px">เลือกทั้งหมดที่เห็น</button>
      <button class="btn" id="lnone">ล้าง</button>
      <button class="btn" id="luntag" style="margin-left:8px">☐ เฉพาะยังไม่ติด TAG</button></div>
    <div id="ltagcount" style="font-size:13px;margin:8px 0"></div>
    <div style="background:#eff6ff;border-left:4px solid var(--blue);padding:9px 12px;border-radius:8px;margin:10px 0;font-size:13px;line-height:1.6">📲 <b>ทำแท็ก NFC:</b> กด <b>📋 URL</b> ท้ายแถวเพื่อคัดลอก แล้วเขียนลงแท็กด้วยแอป (เช่น “NFC Tools”) แบบ <b>URL/Link</b> · แตะมือถือ = เปิดหน้าเดียวกับ QR รับของได้เลย · <b>แท็กติดบนโลหะต้องใช้แบบ on-metal</b></div>
    <div class="selbar" style="position:sticky;top:10px;z-index:5;background:var(--card);box-shadow:0 6px 16px rgba(0,0,0,.10);border-radius:10px;padding:10px 14px;margin:10px 0">
      <b id="lcount">เลือก 0</b><div class="spacer"></div>
      <button class="btn" id="lurls">⬇️ CSV (NFC/NIIMBOT)</button>
      <button class="btn" id="ldl">⬇️ ป้าย PNG (ที่เลือก)</button>
      <button class="btn primary" id="lprint">🖨️ พิมพ์ / PDF ป้ายเต็ม (ที่เลือก)</button>
    </div>
    <div id="ltbl"></div>
  </div>`;
  const draw=()=>{const q=$('#lq').value.trim().toLowerCase();
    const inv=S.tools.filter(t=>inView(t)); const done=inv.filter(t=>t.tagged).length;
    $('#ltagcount').innerHTML=`🏷️ ติด TAG/QR แล้ว <b style="color:#16a34a">${done}</b> / ${inv.length} เครื่อง · ยังไม่ติด <b style="color:#dc2626">${inv.length-done}</b>`;
    lblFiltered=inv.filter(t=>(!q||(t.code+' '+t.name+' '+t.no+' '+t.cat).toLowerCase().includes(q))&&(!lblOnlyUntagged||!t.tagged));
    const pg=pgSlice('labels',lblFiltered);
    $('#ltbl').innerHTML=`<div class="listbox"><table class="locktbl"><thead><tr><th></th><th>รหัส</th><th>บ.</th><th>ชื่อ</th><th>NO</th><th class="center">ติด TAG</th><th></th></tr></thead><tbody>${
      pg.rows.map(t=>`<tr><td><input type="checkbox" ${selLabel.has(t.id)?'checked':''} onchange="togLabel('${t.id}',this.checked)"></td><td><b>${esc(t.code)}</b></td><td>${coBadge(t.company)}</td><td>${esc(t.name).slice(0,40)}</td><td>${esc(t.no)}</td><td class="center"><input type="checkbox" ${t.tagged?'checked':''} onchange="toggleTag('${t.id}',this.checked)" title="${t.tagged&&t.taggedAt?('ติดเมื่อ '+esc(fmtDateTH(t.taggedAt))):'ติ๊กเมื่อแกะติด TAG/QR เครื่องนี้แล้ว'}">${t.tagged?' <span style="color:#16a34a">✓</span>':''}</td><td class="right" style="white-space:nowrap"><button class="btn" style="padding:4px 8px" onclick="copyNfcUrl('${t.id}')">📋 URL</button> <button class="btn" style="padding:4px 8px" onclick="downloadLabel('${t.id}')">⬇️ ป้าย</button></td></tr>`).join('')||'<tr><td colspan=7 class="empty">ไม่พบ</td></tr>'
    }</tbody></table></div>${pg.html}`;
    $('#lcount').textContent='เลือก '+selLabel.size;};
  PG_REDRAW['labels']=draw;
  $('#lq').oninput=()=>{pgReset('labels');draw();};
  $('#lall').onclick=()=>{lblFiltered.forEach(t=>selLabel.add(t.id));draw();};
  $('#lnone').onclick=()=>{selLabel=new Set();draw();};
  $('#luntag').onclick=()=>{lblOnlyUntagged=!lblOnlyUntagged;$('#luntag').classList.toggle('primary',lblOnlyUntagged);$('#luntag').textContent=(lblOnlyUntagged?'☑':'☐')+' เฉพาะยังไม่ติด TAG';pgReset('labels');draw();};
  $('#lprint').onclick=printLabels;
  $('#ldl').onclick=downloadLabelsSel;
  $('#lurls').onclick=exportNfcUrls;
  draw();
}
function printLabels(){
  const tools=S.tools.filter(t=>selLabel.has(t.id));
  if(!tools.length){toast('ยังไม่ได้เลือกเครื่อง');return;}
  if(!window.qrcode){toast('ไลบรารี QR ยังโหลดไม่เสร็จ ลองรีเฟรช');return;}
  toast('กำลังสร้างป้าย '+tools.length+' ดวง…');
  let cells='';
  for(const t of tools){let u='';try{u=labelDataURL(t);}catch(e){}
    cells+=`<div class="lbl"><img src="${u}"></div>`;}
  const w=window.open('','_blank');
  w.document.write(`<!doctype html><html lang="th"><head><meta charset="utf-8"><title>ป้ายเต็ม (${tools.length} ดวง)</title>
    <style>*{box-sizing:border-box;margin:0;padding:0}
      body{font-family:"Noto Sans Thai",Tahoma,sans-serif;padding:8mm;color:#111}
      h1{font-size:14px;margin-bottom:6mm;color:#555}
      .grid{display:grid;grid-template-columns:repeat(3,50mm);gap:5mm}
      .lbl{page-break-inside:avoid}
      .lbl img{width:50mm;height:30mm;display:block;border:1px solid #ccc}
      @media print{body{padding:5mm}h1{display:none}}
    </style></head><body><h1>ป้ายเต็ม 5×3 ซม. — ${tools.length} ดวง (พิมพ์/บันทึก PDF)</h1><div class="grid">${cells}</div>
    <scr`+`ipt>window.onload=function(){setTimeout(function(){window.print();},400);}</scr`+`ipt></body></html>`);
  w.document.close();
}

/* ============ TRASH (ถังขยะ — กู้คืน) ============ */
function renderTrash(){
  const items=S.trash||[];
  const slips=(S.slipTrash||[]).filter(s=>!FILTER||s.company===FILTER);
  $('#view').innerHTML=`<div class="panel">
    <h3>🗑️ ใบส่งซ่อมที่ยกเลิก (${slips.length}) <span class="muted" style="font-weight:400">— ย้ายมาจากการยกเลิกใบ · กดกู้คืนกลับเข้าระบบได้</span></h3>
    <table><thead><tr><th>ใบ</th><th>บ.</th><th>วันส่ง</th><th>ช่าง</th><th>สถานะเดิม</th><th></th></tr></thead><tbody>${
      slips.map(s=>`<tr><td><b>${esc(s.no)}</b></td><td>${coBadge(s.company)}</td><td>${esc(s.sent)||'-'}</td><td>${esc(s.vendor)||'-'}</td><td>${esc(s.status)}</td><td class="right">${canEditCo(s.company)?`<button class="btn" style="background:#dcfce7;color:#15803d;padding:6px 14px" onclick="restoreSlip('${esc(s.no)}','${esc(s.company)}')">♻️ กู้คืนใบ</button>`:'<span class="muted" style="font-size:12px">—</span>'}</td></tr>`).join('')||'<tr><td colspan=6 class="empty">ไม่มีใบที่ยกเลิก</td></tr>'
    }</tbody></table>
  </div>
  <div class="panel">
    <h3>ถังขยะเครื่องมือ (${items.length}) <span class="muted" style="font-weight:400">— เครื่องที่ถูกลบ · กู้คืนได้เฉพาะบริษัทตัวเอง</span></h3>
    <table><thead><tr><th>รหัส</th><th>บริษัท</th><th>ชื่อ</th><th>NO</th><th>ลบเมื่อ</th><th></th></tr></thead><tbody>${
      items.map((t,i)=>`<tr><td><b>${esc(t.code)}</b></td><td>${coBadge(t.company)}</td><td>${esc(t.name)}</td><td>${esc(t.no)}</td><td class="muted">${esc(t.updated)}</td><td class="right">${canEditCo(t.company)?`<button class="btn" style="background:#dcfce7;color:#15803d;padding:6px 14px" onclick="restoreTool(${i})">♻️ กู้คืน</button>`:'<span class="muted" style="font-size:12px">—</span>'}</td></tr>`).join('')||'<tr><td colspan=6 class="empty">ถังขยะว่าง</td></tr>'
    }</tbody></table>
  </div>`;
}

/* ============ AUDIT (ประวัติแก้ไขทั้งระบบ — admin) ============ */
function renderAudit(){
  if(ME.role!=='admin'){$('#view').innerHTML='<div class="panel empty">เฉพาะผู้ดูแลระบบ (admin) เท่านั้น</div>';return;}
  $('#view').innerHTML=`<div class="panel"><div class="toolbar"><input class="search" id="aq" placeholder="🔎 ค้นหา: รหัสเครื่อง / อีเมล / การกระทำ…"></div><div id="atl"></div></div>`;
  const draw=()=>{const q=$('#aq').value.trim().toLowerCase();
    let a=(S.audit||[]);
    if(q)a=a.filter(x=>((x.tool_code||'')+' '+(x.user_email||'')+' '+(x.action||'')+' '+(x.detail||'')).toLowerCase().includes(q));
    const pg=pgSlice('audit',a);
    $('#atl').innerHTML=pg.rows.length?`<div class="listbox"><table class="locktbl"><thead><tr><th>เมื่อ</th><th>ใคร</th><th>บ.</th><th>ทำอะไร</th><th>เครื่อง</th><th>รายละเอียด</th></tr></thead><tbody>${pg.rows.map(x=>`<tr><td class="muted" style="white-space:nowrap">${esc(fmtDTH(x.occurred_at))}</td><td style="font-size:12px">${esc(x.user_email||'')}</td><td>${coBadge(x.company)}</td><td><b>${esc(x.action||'')}</b></td><td>${esc(x.tool_code||'')}</td><td style="font-size:12px">${esc(x.detail||'')}</td></tr>`).join('')}</tbody></table></div>${pg.html}`:'<div class="empty">ยังไม่มีประวัติ หรือไม่พบ</div>';};
  PG_REDRAW['audit']=draw;
  $('#aq').oninput=()=>{pgReset('audit');draw();};draw();
}

/* ============ USERS (จัดการผู้ใช้ — admin) ============ */
async function renderUsers(){
  if(ME.role!=='admin'){$('#view').innerHTML='<div class="panel empty">เฉพาะผู้ดูแลระบบ (admin) เท่านั้น</div>';return;}
  const {data:profs,error}=await sb.from('profiles').select('*').order('email');
  if(error){$('#view').innerHTML='<div class="panel empty">โหลดไม่ได้: '+esc(error.message)+'</div>';return;}
  $('#view').innerHTML=`<div class="panel">
    <h3>ผู้ใช้ทั้งหมด (${profs.length}) <span class="muted" style="font-weight:400">— ตั้งบทบาท + บริษัท แล้วกดบันทึก</span></h3>
    <table><thead><tr><th>อีเมล</th><th>บทบาท</th><th>เห็นบริษัท</th><th></th></tr></thead><tbody>${
      profs.map(p=>`<tr>
        <td><b>${esc(p.email||p.id.slice(0,8))}</b></td>
        <td><select id="ur_${p.id}"><option value="staff" ${p.role==='staff'?'selected':''}>พนักงาน (staff)</option><option value="admin" ${p.role==='admin'?'selected':''}>ผู้ดูแล (admin — เห็นทุกบริษัท)</option></select></td>
        <td><select id="uc_${p.id}"><option value="" ${!p.company?'selected':''}>— ยังไม่กำหนด (ยังเข้าไม่ได้)</option><option value="PAC" ${p.company==='PAC'?'selected':''}>PAC</option><option value="LOTUS" ${p.company==='LOTUS'?'selected':''}>LOTUS</option></select></td>
        <td><button class="btn primary" style="padding:6px 14px" onclick="saveUser('${p.id}')">บันทึก</button> ${p.id!==ME.id?`<button class="btn" style="background:#fee2e2;color:#b91c1c;padding:6px 12px" onclick="delUser('${p.id}','${esc(p.email||'')}')">ลบ</button>`:`<span class="muted" style="font-size:12px">(คุณ)</span>`}</td>
      </tr>`).join('')
    }</tbody></table>
    <p class="muted" style="margin-top:12px;font-size:13px">💡 พนักงานใหม่: ให้กด "สมัครบัญชีใหม่" ที่หน้าเว็บก่อน → ชื่อจะมาโผล่ที่นี่ → คุณตั้งบริษัทให้ → เขาถึงจะเห็นข้อมูล</p>
  </div>`;
}
async function saveUser(id){
  const role=$('#ur_'+id).value, company=$('#uc_'+id).value||null;
  const {error}=await sb.from('profiles').update({role,company}).eq('id',id);
  if(error){toast('บันทึกไม่ได้: '+error.message);return;}
  toast('อัปเดตสิทธิ์แล้ว');renderUsers();
}
async function delUser(id,email){
  if(id===ME.id){toast('ลบบัญชีตัวเองไม่ได้');return;}
  if(!confirm(`ลบผู้ใช้ ${email}?\nเขาจะหมดสิทธิ์เข้าถึงข้อมูลทันที\n(ถ้าต้องการบล็อกการล็อกอินถาวร ลบบัญชีในแดชบอร์ด Supabase → Authentication อีกที)`))return;
  const {error}=await sb.from('profiles').delete().eq('id',id);
  if(error){toast('ลบไม่ได้: '+error.message);return;}
  toast('ลบผู้ใช้ '+email+' แล้ว');renderUsers();
}

/* ============ modal ============ */
function openModal(html){$('#modal').innerHTML=html;$('#scrim').classList.add('on');}
function closeModal(){$('#scrim').classList.remove('on');}
$('#scrim').addEventListener('click',e=>{if(e.target.id==='scrim')closeModal();});

init();
</script>
